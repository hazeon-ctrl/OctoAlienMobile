<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="OCTO ALIEN">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <style>html{-webkit-text-size-adjust:100%;}</style>
    <title>OCTO ALIEN - Retro Arcade</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; }
        html, body { width:100%; height:100%; background:#000; overflow:hidden; overscroll-behavior:none; position:fixed; }
        body { display:flex; justify-content:center; align-items:center; font-family:'VT323',monospace; touch-action:none; padding-top:env(safe-area-inset-top,0px); padding-bottom:env(safe-area-inset-bottom,0px); padding-left:env(safe-area-inset-left,0px); padding-right:env(safe-area-inset-right,0px); }
        #gameContainer { position:relative; }
        canvas { border:2px solid #00ffff; box-shadow:0 0 20px rgba(0,255,255,0.5),0 0 60px rgba(0,255,255,0.15); display:block; image-rendering:pixelated; }
        .overlay { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.93); display:flex; flex-direction:column; justify-content:center; align-items:center; color:white; z-index:20; }
        .hidden { display:none !important; }
        .menu-title { font-family:'VT323',monospace; font-size:clamp(2.8rem,10vw,5rem); letter-spacing:6px; text-shadow:0 0 30px currentColor,0 0 60px currentColor; animation:pulse 2s ease-in-out infinite; margin-bottom:0.2rem; line-height:1; }
        .menu-sub { font-family:'Share Tech Mono',monospace; font-size:clamp(0.6rem,2vw,0.8rem); letter-spacing:4px; color:#777; margin-bottom:2rem; text-transform:uppercase; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.65} }
        @keyframes flicker { 0%,19%,21%,23%,25%,54%,56%,100%{opacity:1} 20%,24%,55%{opacity:0.35} }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        .octo-preview { margin:0.5rem 0 1.2rem; animation:float 3s ease-in-out infinite; filter:drop-shadow(0 0 12px #ff00ff); }
        .arcade-btn { padding:clamp(0.7rem,2.5vw,1rem) clamp(1.5rem,6vw,2.8rem); font-size:clamp(1.2rem,5vw,1.6rem); font-family:'VT323',monospace; letter-spacing:3px; border:2px solid currentColor; border-radius:0; cursor:pointer; transition:all 0.15s; background:transparent; position:relative; overflow:hidden; min-height:52px; min-width:160px; }
        .arcade-btn::before { content:''; position:absolute; inset:0; background:currentColor; opacity:0; transition:opacity 0.15s; }
        .arcade-btn:active::before { opacity:0.18; }
        .arcade-btn:active { transform:scale(0.95); }
        .btn-play { color:#00ffff; } .btn-victory { color:#00ff66; } .btn-gameover { color:#ff00ff; }
        .controls-info { margin-top:1.5rem; font-family:'Share Tech Mono',monospace; font-size:clamp(0.6rem,2vw,0.72rem); text-align:center; color:#555; letter-spacing:2px; line-height:2; padding:0 1rem; }
        .controls-info .hl { color:#00ffff; }
        .result-score { font-family:'VT323',monospace; font-size:clamp(1.5rem,6vw,2rem); margin:0.8rem 0 1.8rem; letter-spacing:4px; }
        .result-score .val { font-size:clamp(2rem,9vw,3.2rem); display:block; }
        #scanlines { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,0,0,0.07) 3px,rgba(0,0,0,0.07) 4px); z-index:10; }
        #vignette { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,0.65) 100%); z-index:11; }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="gameCanvas" width="400" height="700"></canvas>
    <div id="scanlines"></div>
    <div id="vignette"></div>
    <div id="menuScreen" class="overlay">
        <div class="octo-preview">
            <svg width="110" height="76" viewBox="0 0 120 80">
                <rect x="20" y="10" width="80" height="30" fill="#ff00ff" rx="5"/>
                <rect x="28" y="17" width="20" height="10" fill="#fff" rx="2"/>
                <rect x="72" y="17" width="20" height="10" fill="#fff" rx="2"/>
                <rect x="33" y="19" width="10" height="6" fill="#110011" rx="1"/>
                <rect x="77" y="19" width="10" height="6" fill="#110011" rx="1"/>
                <rect x="26" y="40" width="8" height="20" fill="#ff00ff" rx="3"/>
                <rect x="38" y="40" width="8" height="24" fill="#ff00ff" rx="3"/>
                <rect x="50" y="40" width="8" height="18" fill="#ff00ff" rx="3"/>
                <rect x="62" y="40" width="8" height="26" fill="#ff00ff" rx="3"/>
                <rect x="74" y="40" width="8" height="20" fill="#ff00ff" rx="3"/>
                <rect x="86" y="40" width="8" height="22" fill="#ff00ff" rx="3"/>
            </svg>
        </div>
        <h1 class="menu-title" style="color:#ff00ff">OCTO ALIEN</h1>
        <p class="menu-sub">Retro Arcade Shooter</p>
        <button class="arcade-btn btn-play" onclick="startGame()">&#9654; PLAY</button>
        <div class="controls-info">
            <span class="hl">MOBILE</span> &mdash; DRAG SCREEN TO MOVE<br>
            HOLD CHARGE: 2&times; FIRE + SCATTER &middot; RELEASE TO BLAST<br>
            <span class="hl">PC</span> &mdash; A/D &middot; ARROWS &middot; HOLD SPACE<br>
            Every <span class="hl">100 pts</span>: MILESTONE SCATTER BONUS!
        </div>
    </div>
    <div id="victoryScreen" class="overlay hidden">
        <h1 class="menu-title" style="color:#00ffff;animation:flicker 3s infinite;">VICTORY!</h1>
        <div class="result-score" style="color:#ff00ff">FINAL SCORE<span class="val" id="victoryScore">0</span></div>
        <button class="arcade-btn btn-victory" onclick="startGame()">&#9654; PLAY AGAIN</button>
    </div>
    <div id="gameOverScreen" class="overlay hidden">
        <h1 class="menu-title" style="color:#ff2244;animation:flicker 1.5s infinite;">GAME OVER</h1>
        <div class="result-score" style="color:#00ffff">SCORE<span class="val" id="gameOverScore">0</span></div>
        <button class="arcade-btn btn-gameover" onclick="startGame()">&#8634; TRY AGAIN</button>
    </div>
</div>
<script>
'use strict';
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let audioCtx, gameState = 'MENU', game = {}, keys = {};
let animationId, lastTime = 0;
let moveTouch = null, chargeTouch = null;

function resizeCanvas() {
    const s = getComputedStyle(document.body);
    const safeW = window.innerWidth - parseFloat(s.paddingLeft||0) - parseFloat(s.paddingRight||0);
    const safeH = window.innerHeight - parseFloat(s.paddingTop||0) - parseFloat(s.paddingBottom||0);
    const scale = Math.min(safeW/400, safeH/700);
    const w = Math.floor(400*scale), h = Math.floor(700*scale);
    canvas.style.width = w+'px'; canvas.style.height = h+'px';
    const gc = document.getElementById('gameContainer');
    gc.style.width = w+'px'; gc.style.height = h+'px';
}
window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', function(){ setTimeout(resizeCanvas, 200); });
resizeCanvas();

function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}
function sound(type, arg1) {
    if (!audioCtx) return;
    var now = audioCtx.currentTime;
    function mkOsc(freq, wt, gain, dur, freqEnd) {
        var osc = audioCtx.createOscillator(), g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        osc.type = wt||'sine';
        osc.frequency.setValueAtTime(freq, now);
        if (freqEnd) osc.frequency.exponentialRampToValueAtTime(freqEnd, now+dur);
        g.gain.setValueAtTime(gain, now);
        g.gain.exponentialRampToValueAtTime(0.001, now+dur);
        osc.start(now); osc.stop(now+dur);
    }
    if (type==='shoot') mkOsc(520,'square',0.06,0.07,260);
    else if (type==='scatter') mkOsc(660,'square',0.05,0.06,330);
    else if (type==='hit') mkOsc(380,'sine',0.1,0.1,200);
    else if (type==='damage') mkOsc(300,'sawtooth',0.18,0.25,80);
    else if (type==='charge') mkOsc(200,'sine',0.05,0.12,400);
    else if (type==='detonate') { mkOsc(60,'sawtooth',0.3,0.5); mkOsc(120,'square',0.15,0.3); }
    else if (type==='phase') [180,240,300,360].forEach(function(f,i){ setTimeout(function(){ mkOsc(f,'sine',0.1,0.3); },i*80); });
    else if (type==='victory') [260,330,390,520,650].forEach(function(f,i){ setTimeout(function(){ mkOsc(f,'sine',0.12,0.3); },i*100); });
    else if (type==='octoHit') { mkOsc(440,'sawtooth',0.1,0.15,220); mkOsc(660,'sine',0.06,0.1); }
    else if (type==='scatter_ready') [440,550].forEach(function(f,i){ setTimeout(function(){ mkOsc(f,'sine',0.1,0.2); },i*60); });
    else if (type==='octo_die') { mkOsc(80,'sawtooth',0.35,0.8); [200,280,360].forEach(function(f,i){ setTimeout(function(){ mkOsc(f,'square',0.15,0.4); },i*80); }); }
    else if (type==='charge_pulse') mkOsc(200+arg1*180,'sine',0.04+arg1*0.06,0.08);
}

function spawnParticles(x, y, n, col, spd, life) {
    for (var i=0;i<n;i++) {
        var a=Math.random()*Math.PI*2, s=spd*(0.5+Math.random()*0.5);
        game.particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:life,max:life,col:col||'#ffff00'});
    }
}
function makeOcto(x, y, hpScale) {
    var hp = Math.floor(100*(hpScale||1));
    return {x:x,y:y,w:80,health:hp,maxHealth:hp,phase:1,dir:x<200?1:-1,bombT:0,armour:0};
}

function initGame() {
    var stars = [];
    for (var si=0;si<70;si++) stars.push({x:Math.random()*400,y:Math.random()*700,s:Math.random()*2+0.5,spd:Math.random()*0.4+0.1,bright:Math.random()});
    game = {
        octos:[makeOcto(200,55,1)], wave:1, waveAnnounce:0,
        player:{x:200,y:630,w:30,health:100,lives:3,vx:0,respawn:0,iframes:0,trail:[],lastScoreMilestone:0},
        bricks:[], bombers:[], pBullets:[], eBullets:[], oBombs:[],
        charge:{state:'IDLE',time:0,x:0,y:0,zones:[],pulseT:0,scatterT:0},
        score:0, t:0, brickT:0, bomberT:0, shootT:0,
        particles:[], shake:0, shakeX:0, shakeY:0, showCtrl:true, ctrlT:0,
        bgStars:stars, flash:0
    };
    var cols=11, bw=300/cols, positions=[];
    for (var r=0;r<4;r++) for (var c=0;c<cols;c++) positions.push({r:r,c:c});
    for (var i=positions.length-1;i>0;i--) { var j=Math.floor(Math.random()*(i+1)); var tmp=positions[i]; positions[i]=positions[j]; positions[j]=tmp; }
    for (var i=0;i<30;i++) {
        var p=positions[i], x=50+p.c*bw+bw/2, y=120+p.r*28;
        game.bricks.push({x:x,y:y,w:bw-5,h:20,st:Math.random()*3.5});
    }
}

function startGame() {
    initAudio(); initGame(); gameState='PLAYING';
    moveTouch=null; chargeTouch=null;
    document.getElementById('menuScreen').classList.add('hidden');
    document.getElementById('victoryScreen').classList.add('hidden');
    document.getElementById('gameOverScreen').classList.add('hidden');
    lastTime=performance.now();
    if (animationId) cancelAnimationFrame(animationId);
    animationId=requestAnimationFrame(gameLoop);
}
function showVictory() {
    gameState='VICTORY';
    document.getElementById('victoryScore').textContent=game.score;
    document.getElementById('victoryScreen').classList.remove('hidden');
    sound('victory');
}
function showGameOver() {
    gameState='GAME_OVER';
    document.getElementById('gameOverScore').textContent=game.score;
    document.getElementById('gameOverScreen').classList.remove('hidden');
}

window.addEventListener('keydown', function(e){ keys[e.key]=true; if(e.key===' ') e.preventDefault(); });
window.addEventListener('keyup', function(e){
    keys[e.key]=false;
    if (e.key===' ' && game.charge && game.charge.state==='CHARGING') releaseCharge();
});

function toCanvas(cx, cy) {
    var r=canvas.getBoundingClientRect();
    return {x:(cx-r.left)*(400/r.width), y:(cy-r.top)*(700/r.height)};
}
function inChargeZone(x,y){ return x>=5&&x<=90&&y>=550&&y<=640; }

canvas.addEventListener('touchstart', function(e){
    if (gameState!=='PLAYING') return;
    e.preventDefault();
    for (var i=0;i<e.changedTouches.length;i++) {
        var t=e.changedTouches[i], pos=toCanvas(t.clientX,t.clientY);
        if (inChargeZone(pos.x,pos.y)) {
            if (game.charge.state==='IDLE') {
                game.charge.state='CHARGING'; game.charge.time=0; game.charge.scatterT=0;
                chargeTouch=t.identifier; sound('charge');
            } else if (game.charge.state==='LAUNCHED') {
                game.charge.state='DETONATING'; chargeTouch=null;
            }
        } else {
            if (moveTouch===null) moveTouch={id:t.identifier,currentX:pos.x};
        }
    }
},{passive:false});

canvas.addEventListener('touchmove', function(e){
    if (gameState!=='PLAYING') return;
    e.preventDefault();
    for (var i=0;i<e.changedTouches.length;i++) {
        var t=e.changedTouches[i];
        if (moveTouch&&t.identifier===moveTouch.id) moveTouch.currentX=toCanvas(t.clientX,t.clientY).x;
    }
},{passive:false});

canvas.addEventListener('touchend', function(e){
    if (gameState!=='PLAYING') return;
    e.preventDefault();
    for (var i=0;i<e.changedTouches.length;i++) {
        var t=e.changedTouches[i];
        if (moveTouch&&t.identifier===moveTouch.id) moveTouch=null;
        if (chargeTouch!==null&&t.identifier===chargeTouch) {
            if (game.charge&&game.charge.state==='CHARGING') releaseCharge();
            chargeTouch=null;
        }
    }
},{passive:false});

canvas.addEventListener('touchcancel', function(e){
    for (var i=0;i<e.changedTouches.length;i++) {
        var t=e.changedTouches[i];
        if (moveTouch&&t.identifier===moveTouch.id) moveTouch=null;
        if (chargeTouch!==null&&t.identifier===chargeTouch) chargeTouch=null;
    }
},{passive:false});

function releaseCharge() {
    if (!game||!game.charge) return;
    game.charge.state='LAUNCHED';
    game.charge.x=game.player.x;
    game.charge.y=game.player.y-20;
}

function fireScatter() {
    var pl=game.player;
    [-30,-15,0,15,30].forEach(function(deg){
        var rad=(deg-90)*Math.PI/180;
        game.pBullets.push({x:pl.x,y:pl.y-18,vx:Math.cos(rad)*10,vy:Math.sin(rad)*10,scatter:true});
    });
    sound('scatter');
    spawnParticles(pl.x,pl.y-10,8,'#00ffff',3,0.3);
}

function gameLoop(timestamp) {
    if (gameState!=='PLAYING') { animationId=null; return; }
    var dt=Math.min((timestamp-lastTime)/1000,0.05);
    lastTime=timestamp;
    game.t+=dt;

    if (game.showCtrl) { game.ctrlT+=dt; if(game.ctrlT>5) game.showCtrl=false; }
    if (game.waveAnnounce>0) game.waveAnnounce-=dt;
    if (game.shake>0) {
        game.shake*=0.85;
        game.shakeX=(Math.random()-.5)*game.shake;
        game.shakeY=(Math.random()-.5)*game.shake;
        if(game.shake<0.2) game.shake=0;
    } else { game.shakeX=0; game.shakeY=0; }
    if (game.flash>0) game.flash-=dt*3;

    var ch=game.charge, pl=game.player;

    if (pl.respawn>0) { pl.respawn-=dt; }
    else {
        if (keys['ArrowLeft']||keys['a']||keys['A']) pl.vx=Math.max(pl.vx-1.5,-6);
        else if (keys['ArrowRight']||keys['d']||keys['D']) pl.vx=Math.min(pl.vx+1.5,6);
        else if (moveTouch!==null) {
            var d=moveTouch.currentX-pl.x;
            pl.vx+=(Math.sign(d)*Math.min(Math.abs(d)*0.22,6)-pl.vx)*0.35;
        } else pl.vx*=0.75;
        pl.x+=pl.vx; pl.x=Math.max(15,Math.min(385,pl.x));
        if (pl.iframes>0) pl.iframes-=dt;
        pl.trail.push({x:pl.x,y:pl.y,t:0.25});
        if (pl.trail.length>8) pl.trail.shift();
        pl.trail.forEach(function(t){ t.t-=dt; });

        if (keys[' ']) {
            if (ch.state==='IDLE') { ch.state='CHARGING'; ch.time=0; ch.scatterT=0; keys[' ']=false; sound('charge'); }
            else if (ch.state==='LAUNCHED') { ch.state='DETONATING'; keys[' ']=false; }
        }

        // Normal fire rate when NOT charging
        if (ch.state!=='CHARGING') {
            game.shootT+=dt;
            if (game.shootT>=0.28) {
                game.shootT=0;
                game.pBullets.push({x:pl.x,y:pl.y-18,vy:-10,vx:0,scatter:false});
                sound('shoot');
            }
        }

        var milestone=Math.floor(game.score/100);
        if (milestone>pl.lastScoreMilestone) { pl.lastScoreMilestone=milestone; fireScatter(); sound('scatter_ready'); }
    }

    // CHARGE STATES
    if (ch.state==='CHARGING') {
        ch.time=Math.min(ch.time+dt,2.5);
        var prog=ch.time/2.5;
        var interval=0.45-prog*0.33;
        ch.pulseT=(ch.pulseT||0)+dt;
        if (ch.pulseT>=interval) { ch.pulseT=0; sound('charge_pulse',prog); }
        // 2x fire rate while charging
        game.shootT+=dt;
        if (game.shootT>=0.14) {
            game.shootT=0;
            game.pBullets.push({x:pl.x,y:pl.y-18,vy:-10,vx:0,scatter:false});
            sound('shoot');
        }
        // Continuous scatter every 0.35s
        ch.scatterT+=dt;
        if (ch.scatterT>=0.35) { ch.scatterT=0; fireScatter(); }
        // Auto-release at full charge — restore normal fire rate
        if (ch.time>=2.5) {
            game.shootT=0;
            releaseCharge();
        }
    }
    else if (ch.state==='LAUNCHED') { ch.y-=280*dt; if(ch.y<-30) ch.state='DETONATING'; }
    else if (ch.state==='DETONATING') {
        var t=ch.time, baseW=130, bonus=(t/2.5)*300, w=baseW+bonus, h=(baseW+bonus)*0.65;
        ch.zones.push({x:ch.x,y:ch.y,w:w,h:h,t:4.5});
        sound('detonate'); game.shake=8+(t/2.5)*6; game.flash=0.5+(t/2.5)*0.5;
        for (var i=game.bricks.length-1;i>=0;i--) { var br=game.bricks[i]; if(Math.abs(br.x-ch.x)<w/2&&Math.abs(br.y-ch.y)<h/2){ spawnParticles(br.x,br.y,5,'#ff8800',4,0.5); game.bricks.splice(i,1); game.score+=5; } }
        for (var i=game.eBullets.length-1;i>=0;i--) { var eb=game.eBullets[i]; if(Math.abs(eb.x-ch.x)<w/2&&Math.abs(eb.y-ch.y)<h/2){ game.eBullets.splice(i,1); game.score+=1; } }
        for (var i=game.oBombs.length-1;i>=0;i--) { var ob=game.oBombs[i]; if(Math.abs(ob.x-ch.x)<w/2&&Math.abs(ob.y-ch.y)<h/2){ spawnParticles(ob.x,ob.y,8,'#ff00ff',5,0.5); game.oBombs.splice(i,1); game.score+=3; } }
        for (var i=game.bombers.length-1;i>=0;i--) { var bm=game.bombers[i]; if(Math.abs(bm.x-ch.x)<w/2&&Math.abs(bm.y-ch.y)<h/2){ spawnParticles(bm.x,bm.y,12,'#ffaa00',5,0.6); game.bombers.splice(i,1); game.score+=50; } }
        game.octos.forEach(function(oc){ if(Math.abs(oc.x-ch.x)<w/2+40&&Math.abs(oc.y-ch.y)<h/2+25){ var dmg=5+Math.floor((t/2.5)*10); oc.health=Math.max(0,oc.health-dmg); oc.armour=0.4; spawnParticles(oc.x,oc.y,15,'#ff00ff',6,0.6); sound('octoHit'); } });
        spawnParticles(ch.x,ch.y,30,'#ffffff',8,0.6); spawnParticles(ch.x,ch.y,20,'#ffff00',5,0.8);
        ch.state='IDLE'; // no cooldown
    }
    ch.zones=ch.zones.filter(function(z){ z.t-=dt; return z.t>0; });

    // OCTOS
    game.octos.forEach(function(oc){
        if(oc.armour>0) oc.armour-=dt;
        if(oc.health<=oc.maxHealth*0.49&&oc.phase===1){ oc.phase=2; sound('phase'); game.shake=10; spawnParticles(oc.x,oc.y,25,'#ff00ff',7,0.8); }
        if(oc.phase===2){
            var spd=1.5+(1-oc.health/oc.maxHealth)*2.5;
            oc.x+=oc.dir*spd; if(oc.x<55||oc.x>345) oc.dir*=-1;
            oc.bombT+=dt;
            var iv=Math.max(2.0,5.0-(oc.maxHealth-oc.health)*0.03);
            if(oc.bombT>iv){ oc.bombT=0; var count=oc.health<oc.maxHealth*0.3?3:1; for(var i=0;i<count;i++){ var spread=(i-(count-1)/2)*30; game.oBombs.push({x:oc.x+spread,y:oc.y+35,vy:1.2+Math.random()*0.5,s:14,vx:spread*0.02}); } }
        }
    });
    for (var i=game.octos.length-1;i>=0;i--) {
        if (game.octos[i].health<=0) {
            var dead=game.octos[i];
            sound('octo_die'); spawnParticles(dead.x,dead.y,40,'#ff00ff',8,1.0); spawnParticles(dead.x,dead.y,20,'#ffffff',5,0.7);

            if(game.wave===1&&game.octos.length===0){ game.wave=2; game.waveAnnounce=3.5; game.octos.push(makeOcto(100,55,1.5)); game.octos.push(makeOcto(300,55,1.5)); sound('phase'); }
            else if(game.wave>=2&&game.octos.length===0){ showVictory(); return; }
        }
    }

    // BRICKS
    var anyP2=game.octos.some(function(o){ return o.phase===2; });
    game.brickT+=dt;
    if(game.brickT>(anyP2?0.9:1.3)&&game.bricks.length<55){
        game.brickT=0; var cols=11, bw2=300/cols;
        for(var att=0;att<8;att++){

            var blocked=ch.zones.some(function(z){ return Math.abs(x-z.x)<z.w/2&&Math.abs(y-z.y)<z.h/2; });
            var exists=game.bricks.some(function(b){ return Math.abs(b.x-x)<5&&Math.abs(b.y-y)<5; });

    }
    game.bricks.forEach(function(b){ b.st+=dt; if(b.st>4.5){ b.st=0; game.eBullets.push({x:b.x,y:b.y+12,vy:2.0,t:'brick'}); } });

    game.bombers.forEach(function(b){ b.x+=b.vx; b.p+=0.05; b.y+=Math.sin(b.p)*0.8; b.bt+=dt; if(b.bt>1.8&&b.x>20&&b.x<380){ b.bt=0; game.eBullets.push({x:b.x,y:b.y+15,vy:3.5,t:'bomber',vx:(Math.random()-.5)*0.5}); } });
    game.bombers=game.bombers.filter(function(b){ return b.x>-80&&b.x<480; });

    // BULLETS
    game.pBullets.forEach(function(b){ b.y+=b.vy; if(b.vx) b.x+=b.vx; if(b.scatter){ if(b.x<=4){b.x=4;b.vx=Math.abs(b.vx);} if(b.x>=396){b.x=396;b.vx=-Math.abs(b.vx);} } });
    game.eBullets.forEach(function(b){ b.y+=b.vy; if(b.vx) b.x+=b.vx; });
    game.oBombs.forEach(function(b){ b.y+=b.vy; if(b.vx) b.x+=b.vx; });
    game.pBullets=game.pBullets.filter(function(b){ return b.scatter?(b.y>-15):(b.y>-15&&b.x>-10&&b.x<410); });
    game.eBullets=game.eBullets.filter(function(b){ return b.y<715&&b.x>-20&&b.x<420; });
    game.oBombs=game.oBombs.filter(function(b){ return b.y<715; });

    // COLLISIONS player bullets
    game.pBullets=game.pBullets.filter(function(b){
        for(var oi=0;oi<game.octos.length;oi++){ var oc=game.octos[oi]; if(Math.abs(b.x-oc.x)<43&&Math.abs(b.y-oc.y)<25){ oc.health=Math.max(0,oc.health-1); game.score+=5; oc.armour=0.1; sound('octoHit'); spawnParticles(b.x,b.y,4,'#ff00ff',3,0.3); return false; } }
        for(var i=game.bricks.length-1;i>=0;i--){ var br=game.bricks[i]; if(Math.abs(b.x-br.x)<br.w/2+2&&Math.abs(b.y-br.y)<br.h/2+2){ spawnParticles(br.x,br.y,6,'#ff8800',3,0.4); game.bricks.splice(i,1); game.score+=10; sound('hit'); return false; } }
        for(var i=game.bombers.length-1;i>=0;i--){ var bm=game.bombers[i]; if(Math.abs(b.x-bm.x)<32&&Math.abs(b.y-bm.y)<16){ spawnParticles(bm.x,bm.y,14,'#ffaa00',5,0.6); game.bombers.splice(i,1); game.score+=50; sound('hit'); return false; } }

        for(var i=game.oBombs.length-1;i>=0;i--){ var ob=game.oBombs[i]; if(Math.abs(b.x-ob.x)<ob.s+3&&Math.abs(b.y-ob.y)<ob.s+3){ spawnParticles(ob.x,ob.y,8,'#ff00ff',4,0.4); game.oBombs.splice(i,1); game.score+=5; sound('hit'); return false; } }
        return true;
    });

    // COLLISIONS enemy->player
    if(pl.respawn<=0&&pl.iframes<=0){
        game.eBullets=game.eBullets.filter(function(b){
            if(Math.abs(b.x-pl.x)<14&&Math.abs(b.y-pl.y)<14){ pl.health=Math.max(0,pl.health-20); pl.iframes=0.4; sound('damage'); game.shake=4; spawnParticles(pl.x,pl.y,8,'#00bfff',4,0.4); if(pl.health<=0){pl.health=100;pl.lives--;pl.respawn=1.5;pl.iframes=1.5;game.shake=7;if(pl.lives<=0)showGameOver();} return false; } return true;

    }

    game.particles=game.particles.filter(function(p){ p.x+=p.vx*dt*60; p.y+=p.vy*dt*60; p.vx*=0.95; p.vy*=0.95; p.life-=dt; return p.life>0; });
    render();
    animationId=requestAnimationFrame(gameLoop);
}

    ctx.shadowBlur=20; ctx.shadowColor=hf?'#ffffff':'#ff00ff';
    var ts=10;
    for(var i=0;i<8;i++){

        var tg=ctx.createLinearGradient(tx,oc.y+15,tx,oc.y+15+th);
        tg.addColorStop(0,ocCol); tg.addColorStop(1,'rgba(200,0,200,0)');
        ctx.fillStyle=tg; ctx.fillRect(tx-4,oc.y+14,8,th);
    }
    ctx.fillStyle=ocCol; ctx.beginPath(); ctx.roundRect(oc.x-42,oc.y-18,84,33,10); ctx.fill();
    ctx.shadowBlur=8; ctx.shadowColor='#ffffff'; ctx.fillStyle='#fff';
    ctx.fillRect(oc.x-28,oc.y-12,20,10); ctx.fillRect(oc.x+8,oc.y-12,20,10);
    ctx.fillStyle='#f00'; ctx.fillRect(oc.x-23,oc.y-10,10,6); ctx.fillRect(oc.x+13,oc.y-10,10,6);
    if(oc.phase===2){ ctx.fillStyle='#ff0'; ctx.fillRect(oc.x-20,oc.y-9,4,4); ctx.fillRect(oc.x+16,oc.y-9,4,4); }
    ctx.fillStyle='#220022'; ctx.fillRect(oc.x-40,oc.y+42,80,6);

    ctx.strokeStyle='rgba(255,0,255,0.5)'; ctx.lineWidth=1; ctx.strokeRect(oc.x-40,oc.y+42,80,6);
    ctx.shadowBlur=0;
}

        ctx.fillStyle='rgba(255,255,0,0.25)'; ctx.fillRect(bx+4,by+bh-12,(bw2-8)*p3,6);
        ctx.strokeStyle='#ffff00'; ctx.lineWidth=1; ctx.strokeRect(bx+4,by+bh-12,bw2-8,6);
        if(Math.sin(game.t*40)>0){ ctx.fillStyle='rgba(255,255,255,0.18)'; ctx.fillRect(bx+4,by+4,bw2-8,8); }
    }
    ctx.fillStyle=isC?'#ffff00':'#cceeff'; ctx.font='20px VT323'; ctx.textAlign='center';
    var chLabel = isC ? (ch.time>=2.5 ? 'AUTO!' : 'HOLD!') : (isL ? 'DET!' : 'CHARGE');
    ctx.fillText(chLabel, bx+bw2/2, by+42);
    if(!isC&&!isL){ var p4=0.4+Math.sin(game.t*3)*0.15; ctx.fillStyle='rgba(0,200,255,'+p4*0.12+')'; ctx.beginPath(); ctx.arc(bx+bw2/2,by+bh/2-4,18,0,Math.PI*2); ctx.fill(); }
    ctx.textAlign='left';

    if(game.showCtrl){
        var fd=game.ctrlT<3.5?1:Math.max(0,1-(game.ctrlT-3.5)*0.67);
        if(fd>0){ ctx.fillStyle='rgba(0,255,255,'+fd*0.7+')'; ctx.font='18px VT323'; ctx.textAlign='center'; ctx.fillText('\u2190 DRAG TO MOVE \u2192',200,530); ctx.fillText('HOLD CHARGE BTN \u2192',200,548); ctx.textAlign='left'; }
    }
    if(moveTouch&&pl.respawn<=0){
        var d2=moveTouch.currentX-pl.x;
        if(Math.abs(d2)>10){ ctx.fillStyle='rgba(0,255,255,0.25)'; ctx.font='24px VT323'; ctx.textAlign='center'; ctx.fillText(d2>0?'\u25b6':'\u25c0',pl.x+Math.sign(d2)*30,pl.y-28); ctx.textAlign='left'; }
    }
    ctx.restore();
}
</script>
