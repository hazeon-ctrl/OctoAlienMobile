<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>OCTO ALIEN - Retro Arcade</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            background:#000; display:flex; justify-content:center; align-items:center;
            min-height:100vh; font-family:'VT323',monospace; overflow:hidden; touch-action:none;
        }
        #gameContainer { position:relative; }
        canvas { border:3px solid #0ff; box-shadow:0 0 30px rgba(0,255,255,0.4),0 0 60px rgba(0,255,255,0.15); display:block; }
        .overlay {
            position:absolute; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.92); display:flex; flex-direction:column;
            justify-content:center; align-items:center; color:white;
        }
        .hidden { display:none !important; }
        .menu-title { font-family:'VT323',monospace; font-size:4.5rem; letter-spacing:6px; text-shadow:0 0 30px currentColor,0 0 60px currentColor; animation:pulse 2s ease-in-out infinite; margin-bottom:0.3rem; }
        .menu-sub { font-family:'Share Tech Mono',monospace; font-size:0.8rem; letter-spacing:4px; color:#888; margin-bottom:2.5rem; text-transform:uppercase; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
        @keyframes flicker { 0%,19%,21%,23%,25%,54%,56%,100%{opacity:1} 20%,24%,55%{opacity:0.4} }
        .octo-preview { margin:1rem 0 1.5rem; animation:float 3s ease-in-out infinite; }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
        button { padding:0.9rem 2.5rem; font-size:1.4rem; font-family:'VT323',monospace; letter-spacing:3px; border:2px solid currentColor; border-radius:0; cursor:pointer; transition:all 0.2s; background:transparent; position:relative; overflow:hidden; }
        button::before { content:''; position:absolute; inset:0; background:currentColor; opacity:0; transition:opacity 0.2s; }
        button:hover::before { opacity:0.15; }
        button:active { transform:scale(0.96); }
        .menu-btn { color:#0ff; } .victory-btn { color:#0f0; } .gameover-btn { color:#f0f; }
        .controls-info { margin-top:2rem; font-family:'Share Tech Mono',monospace; font-size:0.7rem; text-align:center; color:#555; letter-spacing:2px; line-height:2; }
        .controls-info span { color:#0ff; }
        .result-score { font-family:'VT323',monospace; font-size:2rem; margin:1rem 0 2rem; letter-spacing:4px; }
        .result-score .val { font-size:3rem; display:block; }
        #scanlines { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,0,0,0.08) 3px,rgba(0,0,0,0.08) 4px); z-index:5; }
        #vignette { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,0.6) 100%); z-index:6; }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="gameCanvas" width="400" height="700"></canvas>
    <div id="scanlines"></div>
    <div id="vignette"></div>

    <div id="menuScreen" class="overlay">
        <div class="octo-preview">
            <svg width="120" height="80" viewBox="0 0 120 80">
                <rect x="20" y="10" width="80" height="30" fill="#f0f" rx="4"/>
                <rect x="28" y="17" width="20" height="10" fill="#fff" rx="2"/>
                <rect x="72" y="17" width="20" height="10" fill="#fff" rx="2"/>
                <rect x="33" y="19" width="10" height="6" fill="#000" rx="1"/>
                <rect x="77" y="19" width="10" height="6" fill="#000" rx="1"/>
                <rect x="26" y="40" width="8" height="20" fill="#f0f" rx="3"/>
                <rect x="38" y="40" width="8" height="22" fill="#f0f" rx="3"/>
                <rect x="50" y="40" width="8" height="18" fill="#f0f" rx="3"/>
                <rect x="62" y="40" width="8" height="24" fill="#f0f" rx="3"/>
                <rect x="74" y="40" width="8" height="20" fill="#f0f" rx="3"/>
                <rect x="86" y="40" width="8" height="22" fill="#f0f" rx="3"/>
            </svg>
        </div>
        <h1 class="menu-title" style="color:#f0f">OCTO ALIEN</h1>
        <p class="menu-sub">A retro arcade shooter</p>
        <button class="menu-btn" onclick="startGame()">▶ PLAY</button>
        <div class="controls-info">
            <span>MOBILE</span> — TAP TO MOVE · HOLD CHARGE TO BUILD POWER<br>
            <span>PC</span> — A/D OR ARROWS · SPACE TO CHARGE<br>
            Every 100 pts: AUTO SCATTER SHOT unlocks!
        </div>
    </div>

    <div id="victoryScreen" class="overlay hidden">
        <h1 class="menu-title" style="color:#0ff;animation:flicker 3s infinite;">VICTORY!</h1>
        <div class="result-score" style="color:#f0f">FINAL SCORE<span class="val" id="victoryScore">0</span></div>
        <button class="victory-btn" onclick="startGame()">▶ PLAY AGAIN</button>
    </div>

    <div id="gameOverScreen" class="overlay hidden">
        <h1 class="menu-title" style="color:#f00;animation:flicker 1.5s infinite;">GAME OVER</h1>
        <div class="result-score" style="color:#0ff">SCORE<span class="val" id="gameOverScore">0</span></div>
        <button class="gameover-btn" onclick="startGame()">&#x21BA; TRY AGAIN</button>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let audioCtx, gameState = 'MENU', game = {}, keys = {};
let touchX = null, chargeTouch = false, animationId, lastTime = 0;

// ── AUDIO ──────────────────────────────────────────────────────────────────
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function sound(type, arg1) {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    function mkOsc(freq, wt, gain, dur, freqEnd) {
        const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        osc.type = wt || 'sine';
        osc.frequency.setValueAtTime(freq, now);
        if (freqEnd) osc.frequency.exponentialRampToValueAtTime(freqEnd, now + dur);
        g.gain.setValueAtTime(gain, now); g.gain.exponentialRampToValueAtTime(0.001, now + dur);
        osc.start(now); osc.stop(now + dur);
    }
    switch(type) {
        case 'shoot':         mkOsc(520,'square',0.06,0.07,260); break;
        case 'scatter':       mkOsc(660,'square',0.05,0.06,330); break;
        case 'hit':           mkOsc(380,'sine',0.1,0.1,200); break;
        case 'damage':        mkOsc(300,'sawtooth',0.18,0.25,80); break;
        case 'charge':        mkOsc(200,'sine',0.05,0.12,400); break;
        case 'detonate':      mkOsc(60,'sawtooth',0.3,0.5); mkOsc(120,'square',0.15,0.3); break;
        case 'phase':         [180,240,300,360].forEach((f,i)=>setTimeout(()=>mkOsc(f,'sine',0.1,0.3),i*80)); break;
        case 'victory':       [260,330,390,520,650].forEach((f,i)=>setTimeout(()=>mkOsc(f,'sine',0.12,0.3),i*100)); break;
        case 'octoHit':       mkOsc(440,'sawtooth',0.1,0.15,220); mkOsc(660,'sine',0.06,0.1); break;
        case 'scatter_ready': [440,550].forEach((f,i)=>setTimeout(()=>mkOsc(f,'sine',0.1,0.2),i*60)); break;
        case 'octo_die':      mkOsc(80,'sawtooth',0.35,0.8); [200,280,360].forEach((f,i)=>setTimeout(()=>mkOsc(f,'square',0.15,0.4),i*80)); break;
        case 'charge_pulse':  mkOsc(200+arg1*180,'sine',0.04+arg1*0.06,0.08); break;
    }
}

// ── HELPERS ────────────────────────────────────────────────────────────────
function spawnParticles(x, y, n, col, spd, life) {
    for (let i = 0; i < n; i++) {
        const a = Math.random() * Math.PI * 2, s = spd * (0.5 + Math.random() * 0.5);
        game.particles.push({ x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s, life, max:life, col:col||'#ffff00' });
    }
}
function makeOcto(x, y, hpScale) {
    return { x, y, w:80, health:Math.floor(100*(hpScale||1)), maxHealth:Math.floor(100*(hpScale||1)), phase:1, dir:x<200?1:-1, bombT:0, armour:0 };
}

// ── INIT ───────────────────────────────────────────────────────────────────
function initGame() {
    game = {
        octos: [makeOcto(200,55,1)],
        wave:1, waveAnnounce:0,
        player:{ x:200, y:630, w:30, health:100, lives:3, vx:0, respawn:0, iframes:0, trail:[], lastScoreMilestone:0 },
        bricks:[], bombers:[], pBullets:[], eBullets:[], oBombs:[],
        charge:{ state:'IDLE', time:0, x:0, y:0, cd:0, zones:[], maxCd:3, pulseT:0 },
        score:0, t:0, brickT:0, bomberT:0, shootT:0,
        particles:[], shake:0, shakeX:0, shakeY:0, showCtrl:true, ctrlT:0,
        bgStars: Array.from({length:70}, ()=>({ x:Math.random()*400, y:Math.random()*700, s:Math.random()*2+0.5, spd:Math.random()*0.4+0.1, bright:Math.random() })),
        flash:0,
    };
    // Pre-fill 30 bricks at start
    const cols=11, bw=300/cols, positions=[];
    for (let r=0;r<4;r++) for (let c=0;c<cols;c++) positions.push({r,c});
    for (let i=positions.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [positions[i],positions[j]]=[positions[j],positions[i]]; }
    for (let i=0;i<30;i++) {
        const {r,c}=positions[i], x=50+c*bw+bw/2, y=120+r*28;
        game.bricks.push({ x, y, w:bw-5, h:20, st:Math.random()*3.5 });
    }
}

function startGame() {
    initAudio(); initGame(); gameState='PLAYING';
    ['menuScreen','victoryScreen','gameOverScreen'].forEach(id=>document.getElementById(id).classList.add('hidden'));
    lastTime=performance.now();
    if(animationId) cancelAnimationFrame(animationId);
    animationId=requestAnimationFrame(gameLoop);
}
function showVictory() {
    gameState='VICTORY';
    document.getElementById('victoryScore').textContent=game.score;
    document.getElementById('victoryScreen').classList.remove('hidden');
    sound('victory');
}
function showGameOver() {
    gameState='GAME_OVER';
    document.getElementById('gameOverScore').textContent=game.score;
    document.getElementById('gameOverScreen').classList.remove('hidden');
}

// ── INPUT ──────────────────────────────────────────────────────────────────
window.addEventListener('keydown', e=>{ keys[e.key]=true; if(e.key===' ') e.preventDefault(); });
window.addEventListener('keyup', e=>{ keys[e.key]=false; if(e.key===' '&&game.charge&&game.charge.state==='CHARGING') releaseCharge(); });
canvas.addEventListener('touchstart', e=>{
    e.preventDefault();
    const rect=canvas.getBoundingClientRect(), sx=400/rect.width, sy=700/rect.height;
    for (let i=0;i<e.changedTouches.length;i++) {
        const x=(e.changedTouches[i].clientX-rect.left)*sx, y=(e.changedTouches[i].clientY-rect.top)*sy;
        if(x>=5&&x<=85&&y>=555&&y<=635) {
            if(game.charge&&game.charge.state==='IDLE'&&game.charge.cd<=0){ game.charge.state='CHARGING'; game.charge.time=0; chargeTouch=e.changedTouches[i].identifier; sound('charge'); }
            else if(game.charge&&game.charge.state==='LAUNCHED'){ game.charge.state='DETONATING'; chargeTouch=false; }
        } else { touchX=x; }
    }
}, {passive:false});
canvas.addEventListener('touchmove', e=>{
    e.preventDefault();
    const rect=canvas.getBoundingClientRect(), sx=400/rect.width, sy=700/rect.height;
    for (let i=0;i<e.touches.length;i++) {
        const x=(e.touches[i].clientX-rect.left)*sx, y=(e.touches[i].clientY-rect.top)*sy;
        if(!(x>=5&&x<=85&&y>=555&&y<=635)) touchX=x;
    }
}, {passive:false});
canvas.addEventListener('touchend', e=>{
    e.preventDefault();
    let moveLost=true, chargeLost=false;
    for (let i=0;i<e.changedTouches.length;i++) if(e.changedTouches[i].identifier===chargeTouch) chargeLost=true;
    const rect=canvas.getBoundingClientRect(), sx=400/rect.width, sy=700/rect.height;
    for (let i=0;i<e.touches.length;i++) {
        const x=(e.touches[i].clientX-rect.left)*sx, y=(e.touches[i].clientY-rect.top)*sy;
        if(!(x>=5&&x<=85&&y>=555&&y<=635)) moveLost=false;
    }
    if(moveLost) touchX=null;
    if(chargeLost&&game.charge&&game.charge.state==='CHARGING'){ releaseCharge(); chargeTouch=false; }
}, {passive:false});
function releaseCharge() { if(!game||!game.charge) return; game.charge.state='LAUNCHED'; game.charge.x=game.player.x; game.charge.y=game.player.y-20; }

// ── SCATTER SHOT ───────────────────────────────────────────────────────────
function fireScatter() {
    const pl=game.player;
    [-30,-15,0,15,30].forEach(deg=>{
        const rad=(deg-90)*Math.PI/180;
        game.pBullets.push({ x:pl.x, y:pl.y-18, vx:Math.cos(rad)*10, vy:Math.sin(rad)*10, scatter:true });
    });
    sound('scatter');
    spawnParticles(pl.x, pl.y-10, 8, '#00ffff', 3, 0.3);
}

// ── GAME LOOP ──────────────────────────────────────────────────────────────
function gameLoop(timestamp) {
    if(gameState!=='PLAYING'){ animationId=null; return; }
    const dt=Math.min((timestamp-lastTime)/1000,0.05); lastTime=timestamp;
    game.t+=dt;
    if(game.showCtrl){ game.ctrlT+=dt; if(game.ctrlT>5) game.showCtrl=false; }
    if(game.waveAnnounce>0) game.waveAnnounce-=dt;
    if(game.shake>0){ game.shake*=0.85; game.shakeX=(Math.random()-.5)*game.shake; game.shakeY=(Math.random()-.5)*game.shake; if(game.shake<0.2) game.shake=0; } else { game.shakeX=0; game.shakeY=0; }
    if(game.flash>0) game.flash-=dt*3;

    const ch=game.charge, pl=game.player;

    // ── PLAYER ──────────────────────────────────────────────────────────
    if(pl.respawn>0){ pl.respawn-=dt; }
    else {
        if(keys['ArrowLeft']||keys['a']||keys['A']) pl.vx=Math.max(pl.vx-1.5,-6);
        else if(keys['ArrowRight']||keys['d']||keys['D']) pl.vx=Math.min(pl.vx+1.5,6);
        else if(touchX!==null){ const d=touchX-pl.x; pl.vx+=(Math.sign(d)*Math.min(Math.abs(d)*0.22,6)-pl.vx)*0.35; }
        else pl.vx*=0.75;
        pl.x+=pl.vx; pl.x=Math.max(15,Math.min(385,pl.x));
        if(pl.iframes>0) pl.iframes-=dt;
        pl.trail.push({x:pl.x,y:pl.y,t:0.25}); if(pl.trail.length>8) pl.trail.shift();
        pl.trail.forEach(t=>t.t-=dt);
        if(keys[' ']){
            if(ch.state==='IDLE'&&ch.cd<=0){ ch.state='CHARGING'; ch.time=0; keys[' ']=false; sound('charge'); }
            else if(ch.state==='LAUNCHED'){ ch.state='DETONATING'; keys[' ']=false; }
        }
        // Auto straight shot
        game.shootT+=dt;
        if(game.shootT>=0.28){ game.shootT=0; game.pBullets.push({x:pl.x,y:pl.y-18,vy:-10,vx:0,scatter:false}); sound('shoot'); }
        // Scatter on each 100-pt milestone
        const milestone=Math.floor(game.score/100);
        if(milestone>pl.lastScoreMilestone){ pl.lastScoreMilestone=milestone; fireScatter(); sound('scatter_ready'); }
    }
    if(ch.cd>0) ch.cd-=dt;

    // ── CHARGE STATES ────────────────────────────────────────────────────
    if(ch.state==='CHARGING'){
        ch.time=Math.min(ch.time+dt,2.5);
        const prog=ch.time/2.5;
        // pulse interval shrinks from 0.45s → 0.12s as charge fills
        const interval=0.45-prog*0.33;
        ch.pulseT=(ch.pulseT||0)+dt;
        if(ch.pulseT>=interval){ ch.pulseT=0; sound('charge_pulse',prog); }
    }
    else if(ch.state==='LAUNCHED'){ ch.y-=280*dt; if(ch.y<-30) ch.state='DETONATING'; }
    else if(ch.state==='DETONATING'){
        const t=ch.time, baseW=130, bonus=(t/2.5)*300, w=baseW+bonus, h=(baseW+bonus)*0.65;
        ch.zones.push({x:ch.x,y:ch.y,w,h,t:4.5});
        sound('detonate'); game.shake=8+(t/2.5)*6; game.flash=0.5+(t/2.5)*0.5;
        for(let i=game.bricks.length-1;i>=0;i--){ const br=game.bricks[i]; if(Math.abs(br.x-ch.x)<w/2&&Math.abs(br.y-ch.y)<h/2){ spawnParticles(br.x,br.y,5,'#ff8800',4,0.5); game.bricks.splice(i,1); game.score+=5; } }
        for(let i=game.eBullets.length-1;i>=0;i--){ const eb=game.eBullets[i]; if(Math.abs(eb.x-ch.x)<w/2&&Math.abs(eb.y-ch.y)<h/2){ game.eBullets.splice(i,1); game.score+=1; } }
        for(let i=game.oBombs.length-1;i>=0;i--){ const ob=game.oBombs[i]; if(Math.abs(ob.x-ch.x)<w/2&&Math.abs(ob.y-ch.y)<h/2){ spawnParticles(ob.x,ob.y,8,'#ff00ff',5,0.5); game.oBombs.splice(i,1); game.score+=3; } }
        for(let i=game.bombers.length-1;i>=0;i--){ const bm=game.bombers[i]; if(Math.abs(bm.x-ch.x)<w/2&&Math.abs(bm.y-ch.y)<h/2){ spawnParticles(bm.x,bm.y,12,'#ffaa00',5,0.6); game.bombers.splice(i,1); game.score+=50; } }
        game.octos.forEach(oc=>{ if(Math.abs(oc.x-ch.x)<w/2+40&&Math.abs(oc.y-ch.y)<h/2+25){ const dmg=5+Math.floor((t/2.5)*10); oc.health=Math.max(0,oc.health-dmg); oc.armour=0.4; spawnParticles(oc.x,oc.y,15,'#ff00ff',6,0.6); sound('octoHit'); } });
        spawnParticles(ch.x,ch.y,30,'#ffffff',8,0.6); spawnParticles(ch.x,ch.y,20,'#ffff00',5,0.8);
        ch.state='IDLE'; ch.cd=ch.maxCd;
    }
    ch.zones=ch.zones.filter(z=>{z.t-=dt; return z.t>0;});

    // ── OCTOS ────────────────────────────────────────────────────────────
    game.octos.forEach(oc=>{
        if(oc.armour>0) oc.armour-=dt;
        if(oc.health<=oc.maxHealth*0.49&&oc.phase===1){ oc.phase=2; sound('phase'); game.shake=10; spawnParticles(oc.x,oc.y,25,'#ff00ff',7,0.8); }
        if(oc.phase===2){
            const spd=1.5+(1-oc.health/oc.maxHealth)*2.5;
            oc.x+=oc.dir*spd; if(oc.x<55||oc.x>345) oc.dir*=-1;
            oc.bombT+=dt;
            const interval=Math.max(2.0,5.0-(oc.maxHealth-oc.health)*0.03);
            if(oc.bombT>interval){
                oc.bombT=0;
                const count=oc.health<oc.maxHealth*0.3?3:1;
                for(let i=0;i<count;i++){ const spread=(i-(count-1)/2)*30; game.oBombs.push({x:oc.x+spread,y:oc.y+35,vy:1.2+Math.random()*0.5,s:14,vx:spread*0.02}); }
            }
        }
    });
    // Check octo deaths
    for(let i=game.octos.length-1;i>=0;i--){
        if(game.octos[i].health<=0){
            const dead=game.octos[i];
            sound('octo_die'); spawnParticles(dead.x,dead.y,40,'#ff00ff',8,1.0); spawnParticles(dead.x,dead.y,20,'#ffffff',5,0.7);
            game.score+=200; game.shake=12; game.flash=1.0;
            game.octos.splice(i,1);
            if(game.wave===1&&game.octos.length===0){
                // Spawn 2 tougher octos for wave 2
                game.wave=2; game.waveAnnounce=3.5;
                game.octos.push(makeOcto(100,55,1.5));
                game.octos.push(makeOcto(300,55,1.5));
                sound('phase');
            } else if(game.wave>=2&&game.octos.length===0){
                showVictory(); return;
            }
        }
    }

    // ── BRICKS ───────────────────────────────────────────────────────────
    const anyP2=game.octos.some(o=>o.phase===2);
    const spawnRate=anyP2?0.9:1.3;
    game.brickT+=dt;
    if(game.brickT>spawnRate&&game.bricks.length<55){
        game.brickT=0;
        const cols=11, bw2=300/cols;
        for(let attempt=0;attempt<8;attempt++){
            const c=Math.floor(Math.random()*cols), r=Math.floor(Math.random()*4);
            const x=50+c*bw2+bw2/2, y=120+r*28;
            const blocked=ch.zones.some(z=>Math.abs(x-z.x)<z.w/2&&Math.abs(y-z.y)<z.h/2);
            const exists=game.bricks.some(b=>Math.abs(b.x-x)<5&&Math.abs(b.y-y)<5);
            if(!exists&&!blocked){ game.bricks.push({x,y,w:bw2-5,h:20,st:Math.random()*2}); break; }
        }
    }
    // Bricks shoot slower (4.5s interval)
    game.bricks.forEach(b=>{ b.st+=dt; if(b.st>4.5){ b.st=0; game.eBullets.push({x:b.x,y:b.y+12,vy:2.0,t:'brick'}); } });

    // ── BOMBERS ──────────────────────────────────────────────────────────
    const bomberRate=anyP2?9:14;
    game.bomberT+=dt;
    if(game.bomberT>bomberRate){ game.bomberT=0; const left=Math.random()<0.5; game.bombers.push({x:left?-50:450,y:280+(Math.random()-.5)*60,vx:left?3:-3,p:Math.random()*6.28,bt:0.5+Math.random()}); }
    game.bombers.forEach(b=>{ b.x+=b.vx; b.p+=0.05; b.y+=Math.sin(b.p)*0.8; b.bt+=dt; if(b.bt>1.8&&b.x>20&&b.x<380){ b.bt=0; game.eBullets.push({x:b.x,y:b.y+15,vy:3.5,t:'bomber',vx:(Math.random()-.5)*0.5}); } });
    game.bombers=game.bombers.filter(b=>b.x>-80&&b.x<480);

    // ── BULLETS ──────────────────────────────────────────────────────────
    game.pBullets.forEach(b=>{
        b.y+=b.vy;
        if(b.vx) b.x+=b.vx;
        // Scatter shots reflect off left/right walls
        if(b.scatter){
            if(b.x<=4)  { b.x=4;   b.vx=Math.abs(b.vx); }
            if(b.x>=396){ b.x=396; b.vx=-Math.abs(b.vx); }
        }
    });
    game.eBullets.forEach(b=>{b.y+=b.vy; if(b.vx) b.x+=b.vx;});
    game.oBombs.forEach(b=>{b.y+=b.vy; if(b.vx) b.x+=b.vx;});
    game.pBullets=game.pBullets.filter(b=>b.scatter?(b.y>-15):(b.y>-15&&b.x>-10&&b.x<410));
    game.eBullets=game.eBullets.filter(b=>b.y<715&&b.x>-20&&b.x<420);
    game.oBombs=game.oBombs.filter(b=>b.y<715);

    // ── COLLISIONS: player bullets ────────────────────────────────────
    game.pBullets=game.pBullets.filter(b=>{
        for(let oi=0;oi<game.octos.length;oi++){
            const oc=game.octos[oi];
            if(Math.abs(b.x-oc.x)<43&&Math.abs(b.y-oc.y)<25){ oc.health=Math.max(0,oc.health-1); game.score+=5; oc.armour=0.1; sound('octoHit'); spawnParticles(b.x,b.y,4,'#ff00ff',3,0.3); return false; }
        }
        for(let i=game.bricks.length-1;i>=0;i--){ const br=game.bricks[i]; if(Math.abs(b.x-br.x)<br.w/2+2&&Math.abs(b.y-br.y)<br.h/2+2){ spawnParticles(br.x,br.y,6,'#ff8800',3,0.4); game.bricks.splice(i,1); game.score+=10; sound('hit'); return false; } }
        for(let i=game.bombers.length-1;i>=0;i--){ const bm=game.bombers[i]; if(Math.abs(b.x-bm.x)<32&&Math.abs(b.y-bm.y)<16){ spawnParticles(bm.x,bm.y,14,'#ffaa00',5,0.6); game.bombers.splice(i,1); game.score+=50; sound('hit'); return false; } }
        for(let i=game.eBullets.length-1;i>=0;i--){ const eb=game.eBullets[i]; if(Math.abs(b.x-eb.x)<9&&Math.abs(b.y-eb.y)<12){ game.eBullets.splice(i,1); game.score+=2; sound('hit'); return false; } }
        for(let i=game.oBombs.length-1;i>=0;i--){ const ob=game.oBombs[i]; if(Math.abs(b.x-ob.x)<ob.s+3&&Math.abs(b.y-ob.y)<ob.s+3){ spawnParticles(ob.x,ob.y,8,'#ff00ff',4,0.4); game.oBombs.splice(i,1); game.score+=5; sound('hit'); return false; } }
        return true;
    });

    // ── COLLISIONS: enemy → player ────────────────────────────────────
    if(pl.respawn<=0&&pl.iframes<=0){
        game.eBullets=game.eBullets.filter(b=>{
            if(Math.abs(b.x-pl.x)<14&&Math.abs(b.y-pl.y)<14){
                pl.health=Math.max(0,pl.health-20); pl.iframes=0.4; sound('damage'); game.shake=4; spawnParticles(pl.x,pl.y,8,'#00bfff',4,0.4);
                if(pl.health<=0){ pl.health=100; pl.lives--; pl.respawn=1.5; pl.iframes=1.5; game.shake=7; if(pl.lives<=0) showGameOver(); }
                return false;
            } return true;
        });
        game.oBombs=game.oBombs.filter(b=>{
            if(Math.abs(b.x-pl.x)<14+b.s&&Math.abs(b.y-pl.y)<14+b.s){
                pl.health=Math.max(0,pl.health-30); pl.iframes=0.5; sound('damage'); game.shake=6; spawnParticles(pl.x,pl.y,12,'#ff00ff',5,0.5);
                if(pl.health<=0){ pl.health=100; pl.lives--; pl.respawn=1.5; pl.iframes=1.5; game.shake=8; if(pl.lives<=0) showGameOver(); }
                return false;
            } return true;
        });
    }

    // ── PARTICLES ─────────────────────────────────────────────────────────
    game.particles=game.particles.filter(p=>{ p.x+=p.vx*dt*60; p.y+=p.vy*dt*60; p.vx*=0.95; p.vy*=0.95; p.life-=dt; return p.life>0; });

    render();
    animationId=requestAnimationFrame(gameLoop);
}

// ── DRAW OCTO ──────────────────────────────────────────────────────────────
function drawOcto(oc) {
    const hf=oc.armour>0&&Math.floor(game.t*20)%2===0;
    const ocCol=hf?'#ffffff':(oc.phase===2?'#ff44ff':'#cc00cc');
    ctx.shadowBlur=20; ctx.shadowColor=hf?'#ffffff':'#ff00ff';
    const ts=80/8;
    for(let i=0;i<8;i++){
        const wave=Math.sin(game.t*3+i*0.8)*14, tx=oc.x-40+(i+0.5)*ts, th=Math.abs(wave)+12;
        const tg=ctx.createLinearGradient(tx,oc.y+15,tx,oc.y+15+th);
        tg.addColorStop(0,ocCol); tg.addColorStop(1,'rgba(200,0,200,0)');
        ctx.fillStyle=tg; ctx.fillRect(tx-4,oc.y+14,8,th);
    }
    ctx.fillStyle=ocCol; ctx.beginPath(); ctx.roundRect(oc.x-42,oc.y-18,84,33,10); ctx.fill();
    ctx.shadowBlur=8; ctx.shadowColor='#ffffff'; ctx.fillStyle='#fff';
    ctx.fillRect(oc.x-28,oc.y-12,20,10); ctx.fillRect(oc.x+8,oc.y-12,20,10);
    ctx.fillStyle='#f00'; ctx.fillRect(oc.x-23,oc.y-10,10,6); ctx.fillRect(oc.x+13,oc.y-10,10,6);
    if(oc.phase===2){ ctx.fillStyle='#ff0'; ctx.fillRect(oc.x-20,oc.y-9,4,4); ctx.fillRect(oc.x+16,oc.y-9,4,4); }
    // Per-octo HP bar below body
    const bx=oc.x-40, by=oc.y+42, bw=80;
    ctx.fillStyle='#220022'; ctx.fillRect(bx,by,bw,6);
    ctx.fillStyle=oc.health/oc.maxHealth>0.5?'#ff00ff':'#ff4444';
    ctx.fillRect(bx,by,bw*(oc.health/oc.maxHealth),6);
    ctx.strokeStyle='rgba(255,0,255,0.5)'; ctx.lineWidth=1; ctx.strokeRect(bx,by,bw,6);
    ctx.shadowBlur=0;
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render() {
    ctx.save(); ctx.translate(game.shakeX,game.shakeY);
    ctx.fillStyle='#000'; ctx.fillRect(0,0,400,700);

    // Stars
    game.bgStars.forEach(s=>{ s.y=(s.y+s.spd)%700; const fl=0.5+0.5*Math.sin(game.t*3+s.bright*10); ctx.fillStyle=`rgba(255,255,255,${(0.3+s.bright*0.7)*fl})`; ctx.fillRect(s.x,s.y,s.s,s.s); });
    // Nebula
    const ng=ctx.createRadialGradient(200,350,0,200,350,250); ng.addColorStop(0,`rgba(20,0,40,${0.3+Math.sin(game.t*0.3)*0.1})`); ng.addColorStop(1,'rgba(0,0,0,0)'); ctx.fillStyle=ng; ctx.fillRect(0,0,400,700);
    if(game.flash>0){ ctx.fillStyle=`rgba(255,255,200,${game.flash*0.35})`; ctx.fillRect(0,0,400,700); }

    // Blast zones
    game.charge.zones.forEach(z=>{
        const a=z.t/4.5;
        const grd=ctx.createRadialGradient(z.x,z.y,0,z.x,z.y,Math.max(z.w,z.h)/2);
        grd.addColorStop(0,`rgba(255,255,100,${0.15*a})`); grd.addColorStop(1,'rgba(255,200,0,0)');
        ctx.fillStyle=grd; ctx.fillRect(z.x-z.w/2,z.y-z.h/2,z.w,z.h);
        ctx.strokeStyle=`rgba(255,255,80,${0.6*a})`; ctx.lineWidth=2; ctx.setLineDash([8,4]); ctx.strokeRect(z.x-z.w/2,z.y-z.h/2,z.w,z.h); ctx.setLineDash([]);
    });

    // Octos
    game.octos.forEach(oc=>drawOcto(oc));

    // Bricks
    game.bricks.forEach(b=>{
        ctx.shadowBlur=6; ctx.shadowColor='#ff6600';
        const hp=Math.max(0,1-b.st/4.5);
        ctx.fillStyle=`hsl(${20+hp*20},100%,${35+hp*20}%)`; ctx.fillRect(b.x-b.w/2,b.y-b.h/2,b.w,b.h);
        ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.fillRect(b.x-b.w/2+1,b.y-b.h/2+1,b.w-2,3);
        ctx.shadowBlur=0;
        ctx.fillStyle=`rgba(255,${255-Math.floor(hp*200)},0,0.6)`;
        ctx.fillRect(b.x-b.w/2+2,b.y+b.h/2-4,(b.st/4.5)*(b.w-4),3);
    });

    // Bombers
    game.bombers.forEach(b=>{
        ctx.shadowBlur=10; ctx.shadowColor='#b8860b'; ctx.fillStyle='#c89b1a';
        ctx.beginPath(); ctx.moveTo(b.x,b.y-14); ctx.lineTo(b.x-32,b.y+10); ctx.lineTo(b.x+32,b.y+10); ctx.closePath(); ctx.fill();
        ctx.fillStyle='#654321'; ctx.beginPath(); ctx.ellipse(b.x,b.y-2,10,7,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#4499ff'; ctx.beginPath(); ctx.ellipse(b.x,b.y-2,6,4,0,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0;
    });

    // Player
    const pl=game.player;
    const visible=pl.respawn<=0||Math.floor(game.t*12)%2;
    pl.trail.forEach((tr,idx)=>{ if(tr.t>0&&visible){ const a=(tr.t/0.25)*0.2*(idx/pl.trail.length); ctx.fillStyle=`rgba(0,191,255,${a})`; ctx.beginPath(); ctx.arc(tr.x,tr.y,8*(idx/pl.trail.length),0,Math.PI*2); ctx.fill(); } });
    if(visible){
        const ic=game.charge.state==='CHARGING';
        const prog=ic?(game.charge.time/2.5):0;
        // Progressive glow: cyan normally, shifts yellow→white and expands as charge fills
        const glowR=ic?Math.round(255*prog):0, glowG=ic?Math.round(191+64*(1-prog)):191, glowB=ic?Math.round(255*(1-prog)):255;
        const glowSize=ic?(14+prog*40):12;
        ctx.shadowBlur=glowSize; ctx.shadowColor=ic?`rgb(${glowR},${glowG},${glowB})`:'#00bfff';
        // Second glow ring for fullness effect
        if(ic&&prog>0.4){
            ctx.save();
            ctx.shadowBlur=prog*60; ctx.shadowColor=`rgba(255,255,100,${prog*0.8})`;
            ctx.fillStyle='transparent';
            ctx.beginPath(); ctx.arc(pl.x,pl.y-5,18+prog*12,0,Math.PI*2); ctx.fill();
            ctx.restore();
        }
        ctx.fillStyle=ic?`rgb(${glowR},${glowG},${glowB})`:'#00bfff';
        ctx.beginPath(); ctx.moveTo(pl.x,pl.y-18); ctx.lineTo(pl.x-16,pl.y+8); ctx.lineTo(pl.x-6,pl.y+4); ctx.lineTo(pl.x,pl.y+8); ctx.lineTo(pl.x+6,pl.y+4); ctx.lineTo(pl.x+16,pl.y+8); ctx.closePath(); ctx.fill();
        ctx.fillStyle='#aaeeff'; ctx.beginPath(); ctx.ellipse(pl.x,pl.y-5,5,7,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle=`rgba(0,255,200,${0.6+Math.sin(game.t*20)*0.2})`; ctx.beginPath(); ctx.arc(pl.x,pl.y+10,4,0,Math.PI*2); ctx.fill();
        // Charge energy sparks at high charge
        if(ic&&prog>0.6){
            const sparkCount=Math.floor(prog*6);
            for(let si=0;si<sparkCount;si++){
                const sa=game.t*8+si*(Math.PI*2/sparkCount), sr=20+prog*10;
                const sx2=pl.x+Math.cos(sa)*sr, sy2=pl.y-5+Math.sin(sa)*sr*0.6;
                ctx.fillStyle=`rgba(255,255,100,${0.4+prog*0.5})`;
                ctx.beginPath(); ctx.arc(sx2,sy2,1.5,0,Math.PI*2); ctx.fill();
            }
        }
        ctx.shadowBlur=0;
    }

    // Bullets
    ctx.shadowBlur=8;
    game.pBullets.forEach(b=>{
        if(b.scatter){ ctx.fillStyle='#00ffff'; ctx.shadowColor='#00ffff'; ctx.beginPath(); ctx.arc(b.x,b.y,3.5,0,Math.PI*2); ctx.fill(); }
        else { const g2=ctx.createLinearGradient(b.x,b.y,b.x,b.y+12); g2.addColorStop(0,'#ffffff'); g2.addColorStop(1,'#ffff00'); ctx.fillStyle=g2; ctx.shadowColor='#ffff00'; ctx.fillRect(b.x-2,b.y-8,4,13); }
    });
    game.eBullets.forEach(b=>{ const col=b.t==='brick'?'#ff8800':'#cc0044'; ctx.fillStyle=col; ctx.shadowColor=col; ctx.beginPath(); ctx.ellipse(b.x,b.y,3,6,0,0,Math.PI*2); ctx.fill(); });
    game.oBombs.forEach(b=>{ ctx.fillStyle='#ff00ff'; ctx.shadowColor='#ff00ff'; ctx.shadowBlur=15; ctx.beginPath(); ctx.arc(b.x,b.y,b.s,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='#ffaaff'; ctx.lineWidth=2; ctx.stroke(); ctx.fillStyle='#ffffff'; ctx.shadowBlur=0; ctx.beginPath(); ctx.arc(b.x,b.y,b.s*0.35,0,Math.PI*2); ctx.fill(); });
    ctx.shadowBlur=0;

    if(game.charge.state==='LAUNCHED'){
        const sz=12+game.charge.time*4; ctx.shadowBlur=30; ctx.shadowColor='#ffff00';
        const cg=ctx.createRadialGradient(game.charge.x,game.charge.y,0,game.charge.x,game.charge.y,sz);
        cg.addColorStop(0,'#ffffff'); cg.addColorStop(0.5,'#ffff44'); cg.addColorStop(1,'rgba(255,200,0,0)');
        ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(game.charge.x,game.charge.y,sz,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
    }

    // Particles
    game.particles.forEach(p=>{ const a=p.life/p.max; ctx.fillStyle=p.col+Math.floor(a*255).toString(16).padStart(2,'0'); const sz=2+a*2; ctx.fillRect(p.x-sz/2,p.y-sz/2,sz,sz); });

    // ── UI ──────────────────────────────────────────────────────────────────
    ctx.fillStyle='#0ff'; ctx.font='22px VT323'; ctx.fillText(`SCORE: ${game.score}`,10,335);
    for(let i=0;i<3;i++){ ctx.fillStyle=i<pl.lives?'#ff4466':'#333'; ctx.font='18px VT323'; ctx.fillText('♥',10+i*18,358); }
    ctx.fillStyle='#222'; ctx.fillRect(10,364,120,8);
    ctx.fillStyle=pl.health>60?'#00ff66':pl.health>30?'#ffaa00':'#ff2222'; ctx.fillRect(10,364,pl.health*1.2,8);
    ctx.strokeStyle='#0ff'; ctx.lineWidth=1; ctx.strokeRect(10,364,120,8);
    ctx.fillStyle='#0ff'; ctx.font='14px Share Tech Mono,monospace'; ctx.fillText('HP',136,372);

    // Scatter countdown
    const toNext=100-((game.score)%100);
    ctx.fillStyle='#00ffaa'; ctx.font='14px VT323'; ctx.fillText(`SCATTER: ${toNext===100?'READY!':toNext+' PTS'}`,10,392);

    // Octo label top
    if(game.octos.length>0){
        ctx.fillStyle='#f0f'; ctx.font='16px VT323'; ctx.textAlign='center';
        ctx.fillText(game.wave===1?'OCTO':`OCTO x${game.octos.length}`,200,34);
        if(game.octos.some(o=>o.phase===2)&&Math.sin(game.t*6)>0){ ctx.fillStyle='#ff4444'; ctx.font='14px VT323'; ctx.fillText('⚠ ENRAGED ⚠',200,50); }
        ctx.textAlign='left';
    }

    // Wave 2 banner
    if(game.waveAnnounce>0){
        const a=Math.min(1,game.waveAnnounce/1.5);
        ctx.fillStyle=`rgba(0,0,0,${a*0.75})`; ctx.fillRect(40,290,320,85);
        ctx.strokeStyle=`rgba(255,0,255,${a})`; ctx.lineWidth=2; ctx.strokeRect(40,290,320,85);
        ctx.fillStyle=`rgba(255,0,255,${a})`; ctx.font='44px VT323'; ctx.textAlign='center';
        ctx.fillText('!! WAVE 2 !!',200,325);
        ctx.font='20px VT323'; ctx.fillStyle=`rgba(255,200,0,${a})`;
        ctx.fillText('TWO OCTOS INCOMING!',200,355);
        ctx.textAlign='left';
    }

    // Charge button
    const bx=8,by=558,bw2=72,bh=72;
    const isC=game.charge.state==='CHARGING', isL=game.charge.state==='LAUNCHED', onCd=game.charge.cd>0;
    if(isC){ ctx.fillStyle=`rgba(255,220,0,${0.3+0.4*(game.charge.time/2.5)})`; ctx.shadowBlur=20; ctx.shadowColor='#ffff00'; }
    else if(isL) ctx.fillStyle='rgba(200,160,0,0.5)';
    else if(onCd) ctx.fillStyle='rgba(30,30,60,0.6)';
    else ctx.fillStyle='rgba(0,60,100,0.5)';
    ctx.fillRect(bx,by,bw2,bh); ctx.shadowBlur=0;
    ctx.strokeStyle=onCd?'#334':(isC?'#ffff00':'#0ff'); ctx.lineWidth=2; ctx.strokeRect(bx,by,bw2,bh);
    ctx.fillStyle=onCd?'#556':(isC?'#ffff00':'#ffffff'); ctx.font='18px VT323'; ctx.textAlign='center';
    ctx.fillText(isC?'HOLD!':isL?'DET!':onCd?'WAIT':'CHARGE',bx+bw2/2,by+38);
    if(isC){ const prog=game.charge.time/2.5; ctx.fillStyle='rgba(255,255,0,0.3)'; ctx.fillRect(bx+4,by+bh-14,(bw2-8)*prog,8); ctx.strokeStyle='#ffff00'; ctx.lineWidth=1; ctx.strokeRect(bx+4,by+bh-14,bw2-8,8); }
    if(onCd&&!isL){ const cdp=1-(game.charge.cd/game.charge.maxCd); ctx.fillStyle='rgba(0,200,255,0.2)'; ctx.fillRect(bx,by+bh*(1-cdp),bw2,bh*cdp); ctx.fillStyle='#0ff'; ctx.font='16px VT323'; ctx.fillText(game.charge.cd.toFixed(1)+'s',bx+bw2/2,by+bh-8); }
    ctx.textAlign='left';

    if(game.showCtrl){ const fd=game.ctrlT<4?1:1-(game.ctrlT-4); ctx.fillStyle=`rgba(0,255,255,${Math.max(0,fd)*0.9})`; ctx.font='16px VT323'; ctx.textAlign='center'; ctx.fillText('TAP TO MOVE · HOLD CHARGE TO BLAST',200,530); ctx.textAlign='left'; }

    ctx.restore();
}
</script>
